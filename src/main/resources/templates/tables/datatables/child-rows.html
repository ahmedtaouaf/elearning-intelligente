<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('Child Row Datatables')}" />
    </th:block>

    <th:block layout:fragment="styles">
        <!-- Datatables css -->
        <link href="/plugins/datatables/responsive.bootstrap5.min.css" rel="stylesheet" type="text/css">
    </th:block>
</head>


<body>
    <th:block layout:fragment="content">

        <div th:replace="~{partials/page-title :: page-title(
                 'Tables',
                 'Child Row',
                )}">
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header justify-content-between">
                        <h4 class="card-title"> Example </h4>
                        <a href="https://datatables.net/examples/api/row_details.html" target="_blank"
                            class="icon-link icon-link-hover link-primary fw-semibold">View Docs <i
                                class="ti ti-arrow-right bi align-middle fs-lg"></i></a>
                    </div>

                    <div class="card-body">
                        <div class="alert alert-warning alert-dismissible fade show mb-4" role="alert">
                            <strong>Note:</strong> This is a jQuery-based plugin, so you need to include jQuery
                            for it to work.
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <table id="child-rows-data" class="table table-striped dt-responsive align-middle mb-0">
                            <thead class="thead-sm text-uppercase fs-xxs">
                                <tr>
                                    <th></th>
                                    <th>Company</th>
                                    <th>Symbol</th>
                                    <th>Price</th>
                                    <th>Change</th>
                                    <th>Volume</th>
                                    <th>Market Cap</th>
                                </tr>
                            </thead>
                        </table>
                    </div> <!-- end card-body-->
                </div> <!-- end card-->
            </div>
        </div>

    </th:block>

    <th:block layout:fragment="javascripts">
        <!-- Jquery for Datatables-->
        <script src="/plugins/jquery/jquery.min.js"></script>

        <!-- Datatables js -->
        <script src="/plugins/datatables/dataTables.min.js"></script>
        <script src="/plugins/datatables/dataTables.bootstrap5.min.js"></script>
        <script src="/plugins/datatables/dataTables.responsive.min.js"></script>
        <script src="/plugins/datatables/responsive.bootstrap5.min.js"></script>

        <!-- Page js -->
        <script src="/js/pages/datatables-child-rows.js"></script>
    </th:block>

</body>

</html>
