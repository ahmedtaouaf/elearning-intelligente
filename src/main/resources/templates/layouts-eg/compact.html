<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/base}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('Compact Layout')}" />
    </th:block>

</head>

<body>
    <th:block layout:fragment="content">

        <div class="wrapper">

            <div th:replace="~{partials/sidenav :: sidenav}"></div>

            <div th:replace="~{partials/topbar :: topbar}"></div>

            <div class="content-page">

                <div class="container-fluid">
                    <div th:replace="~{partials/page-title :: page-title(
                      'Compact',
                      null
                    )}">
                    </div>
                </div>
                <!-- container -->

                <div class="container-xl">
                    <div class="row">
                        <div class="col-12">
                            <div
                                class="alert alert-info alert-bordered border-start border-info d-flex align-items-start gap-2">
                                <i class="ti ti-info-circle fs-xxl"></i>
                                <div>
                                    To use the compact layout, follow this structure: wrap your page title in
                                    <code>&lt;div class="container-fluid"&gt;</code> and place your main content inside
                                    <code>&lt;div class="container-xl"&gt;</code>. This ensures proper spacing and
                                    alignment.
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body text-center">
                                    <h4 class="m-0">Your custom content here</h4>
                                </div> <!-- end card-body-->
                            </div> <!-- end card-->
                        </div> <!-- end col-->
                    </div>
                    <!-- end row-->


                </div>
            </div>
        </div>

    </th:block>

    <th:block layout:fragment="javascripts"></th:block>

</body>

</html>
