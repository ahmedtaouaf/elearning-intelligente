<html data-layout-position="scrollable" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('Scrollable Layout')}" />
    </th:block>

</head>

<body>
    <th:block layout:fragment="content">

        <div th:replace="~{partials/page-title :: page-title(
                 'Scrollable',
                 null
                )}">
        </div>

        <div class="row">
                    <div class="col-12">
                        <div class="alert alert-info alert-bordered border-start border-info d-flex align-items-start gap-2">
                            <i class="ti ti-info-circle fs-xxl"></i>
                            <div>
                                To enable full scrolling and view all content, please add 
                                <code>data-layout-position="scrollable"</code> to the 
                                <code>&lt;html&gt;</code> tag.
                            </div>
                        </div>                        
                    </div>
                </div>

                <div style="min-height: 100vh;"></div>

    </th:block>

    <th:block layout:fragment="javascripts"></th:block>

</body>

</html>
