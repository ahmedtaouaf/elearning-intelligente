<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('Other Charts')}" />
    </th:block>

</head>


<body>
    <th:block layout:fragment="content">

        <div th:replace="~{partials/page-title :: page-title(
                 'Charts',
                 'Other Charts',
                )}">
        </div>

        <div class="row">
            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Bubble</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="bubble-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Combo Bar & Line</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="combo-bar-line-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Stacked Bar & Line</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="stacked-bar-line-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Doughnut</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="doughnut-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Multi Series Pie</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="multi-pie-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Pie</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="pie-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Polar Area</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="polar-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Radar</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="radar-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Scatter</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="scatter-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->
        </div>
        <!-- end row-->

    </th:block>

    <th:block layout:fragment="javascripts">
        <!-- Chartjs -->
        <script src="/plugins/chartjs/chart.umd.js"></script>

        <!-- Other chart Demo js -->
        <script src="/js/pages/chartjs-other.js"></script>
    </th:block>

</body>

</html>
