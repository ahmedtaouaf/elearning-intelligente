<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('Line Charts')}" />
    </th:block>

</head>

<body>
    <th:block layout:fragment="content">

        <div th:replace="~{partials/page-title :: page-title(
                 'Charts',
                 'Line Charts',
                )}">
        </div>

        <div class="row">
            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Basic Line</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="basic-line-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Interpolation</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="interpolation-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Multi-Axes</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="multi-axes-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Point Styling</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="point-styling-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Line Segment</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="line-segment-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Stepped</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="stepped-line-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->
        </div>
        <!-- end row-->

    </th:block>

    <th:block layout:fragment="javascripts">
        <!-- Chartjs -->
        <script src="/plugins/chartjs/chart.umd.js"></script>

        <!-- Line chart Demo js -->
        <script src="/js/pages/chartjs-line.js"></script>
    </th:block>

</body>

</html>
