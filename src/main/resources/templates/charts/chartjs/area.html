<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('Area Charts')}" />
    </th:block>

</head>

<body>
    <th:block layout:fragment="content">

        <div th:replace="~{partials/page-title :: page-title(
                 'Charts',
                 'Area Charts',
                )}">
        </div>

        <div class="row">
            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Basic Area</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="basic-area-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Different Dataset</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="different-dataset-area-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Stacked</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="stacked-area-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Boundaries</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="boundaries-area-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->

            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Draw Time</h5>
                    </div>
                    <div class="card-body">
                        <div dir="ltr">
                            <div class="mt-3" style="height: 300px;">
                                <canvas id="draw-time-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- end card body-->
                </div>
                <!-- end card -->
            </div>
            <!-- end col-->
        </div>
        <!-- end row-->

    </th:block>

    <th:block layout:fragment="javascripts">
        <!-- Chartjs -->
        <script src="/plugins/chartjs/chart.umd.js"></script>

        <!-- Area chart Demo js -->
        <script src="/js/pages/chartjs-area.js"></script>
    </th:block>

</body>

</html>
