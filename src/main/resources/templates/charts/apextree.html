<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('ApexTree Apexcharts')}" />
    </th:block>

</head>


<body>
    <th:block layout:fragment="content">

        <div th:replace="~{partials/page-title :: page-title(
                 'Charts',
                 'ApexTree',
                )}">
        </div>

        <div class="card">
            <div class="card-header">
                <h4 class="card-title">Right to left</h4>
            </div>

            <div class="card-body">
                <div dir="ltr">
                    <div id="right-to-left" style="margin: 0 auto;"></div>
                </div>
            </div>
            <!-- end card body-->
        </div>
        <!-- end card -->

        <div class="card">
            <div class="card-header">
                <h4 class="card-title">Bottom</h4>
            </div>

            <div class="card-body">
                <div dir="ltr">
                    <div id="bottom-tree" style="margin: 0 auto;"></div>
                </div>
            </div>
            <!-- end card body-->
        </div>
        <!-- end card -->

        <div class="card">
            <div class="card-header">
                <h4 class="card-title">Top to bottom</h4>
            </div>

            <div class="card-body">
                <div dir="ltr">
                    <div id="top-tree" style="margin: 0 auto;"></div>
                </div>
            </div>
            <!-- end card body-->
        </div>
        <!-- end card -->

        <div class="card">
            <div class="card-header">
                <h4 class="card-title">Collapse Expand</h4>
            </div>

            <div class="card-body">
                <div dir="ltr">
                    <div id="collapse-expand" style="margin: 0 auto;"></div>
                </div>
            </div>
            <!-- end card body-->
        </div>
        <!-- end card -->

    </th:block>

    <th:block layout:fragment="javascripts">
        <!-- Apex Chart js -->
        <script src="/plugins/apextree/apextree.min.js"></script>

        <!-- Apex Chart Heatmap Demo js -->
        <script src="/js/pages/chart-apextree.js"></script>
    </th:block>

</body>

</html>
