<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="page-title(title, subTitle)" th:remove="tag">

        <div th:if="${title != null}">
            <div class="page-title-head d-flex align-items-center">
                <div class="flex-grow-1">
                    <h4 class="fs-xl fw-bold m-0" th:text="${title}">title</h4>
                </div>

                <div class="text-end">
                    <ol class="breadcrumb m-0 py-0">
                        <li class="breadcrumb-item"><a href="javascript: void(0);">UBold</a></li>
                        <li class="breadcrumb-item" th:if="${subTitle != null}" th:text="${subTitle}"><a href="javascript: void(0);">subtitle</a></li>
                        <li class="breadcrumb-item active" th:text="${title}">title</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
