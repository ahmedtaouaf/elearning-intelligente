<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('Email Templates')}" />
    </th:block>

</head>


<body>
    <th:block layout:fragment="content">

        <div th:replace="~{partials/page-title :: page-title(
                 'Email',
                 'Email Templates',
                )}">
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4 col-sm-6">
                                <h4 class="header-title mb-3">Basic Action</h4>
                                <img src="/images/emails/confirm.png" class="img-fluid" alt="">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <h4 class="header-title mb-3">Activated Account</h4>
                                <img src="/images/emails/activated.png" class="img-fluid" alt="">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <h4 class="header-title mb-3">Marketing</h4>
                                <img src="/images/emails/marketing.png" class="img-fluid" alt="">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <h4 class="header-title mb-3">Invoice</h4>
                                <img src="/images/emails/invoice.png" class="img-fluid" alt="">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <h4 class="header-title mb-3">Reports</h4>
                                <img src="/images/emails/reports.png" class="img-fluid" alt="">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <h4 class="header-title mb-3">Reset Password</h4>
                                <img src="/images/emails/reset-password.png" class="img-fluid" alt="">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <h4 class="header-title mb-3">Warning</h4>
                                <img src="/images/emails/warning-mail.png" class="img-fluid" alt="">
                            </div>
                        </div> <!-- end row-->
                    </div>
                </div> <!-- end card -->
            </div> <!-- end col-->
        </div>
        <!-- end row-->

    </th:block>

    <th:block layout:fragment="javascripts"></th:block>

</body>

</html>
