<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('Prévisualisation IA')}" />
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <div class="row">
        <div class="col-xl-8">
            <div class="d-flex align-items-sm-center flex-sm-row flex-column my-3">
                <div class="flex-grow-1">
                    <h4 class="fs-xl mb-1">
                        Prévisualisation : <span class="text-primary">[[${titre}]]</span>
                    </h4>
                    <p class="text-muted mb-0">
                        Type généré : <strong>[[${aiType}]]</strong>
                    </p>
                </div>
            </div>

            <div class="card">
                <div class="card-body">

                    <div class="text-center">
                        <div class="btn-group text-nowrap">
                            <button id="prev" class="btn btn-dark">
                                <i class="ti ti-arrow-left"></i>
                                <span class="d-none d-sm-inline ms-2">Previous</span>
                            </button>

                            <button id="next" class="btn btn-dark">
                                <i class="ti ti-arrow-right"></i>
                                <span class="d-none d-sm-inline ms-2">Next</span>
                            </button>

                            <button id="zoomin" class="btn btn-dark">
                                <i class="ti ti-zoom-in"></i>
                                <span class="d-none d-sm-inline ms-2">Zoom In</span>
                            </button>

                            <button id="zoomout" class="btn btn-dark">
                                <i class="ti ti-zoom-out"></i>
                                <span class="d-none d-sm-inline ms-2">Zoom Out</span>
                            </button>

                            <button id="zoomfit" class="btn btn-dark rounded-end-3">
                                100%
                            </button>

                            <input type="text" class="form-control rounded-end-0 ms-1"
                                   id="page_num" style="width: 50px;">
                            <span class="input-group-text rounded-start-0 border-start-0"
                                  id="page_count">/ 00</span>
                        </div>
                    </div>

                    <div class="text-center overflow-auto mt-3">
                        <canvas id="the-canvas" class="pdfcanvas border rounded-3"></canvas>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <form th:action="@{/enseignant/documents/preview/cancel}" method="post">
                            <button type="submit" class="btn btn-light">Annuler</button>
                        </form>

                        <form th:action="@{/enseignant/documents/preview/confirm}" method="post">
                            <button type="submit" class="btn btn-primary">Confirmer et enregistrer</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-xl-4">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title">Agent IA</h4>
                </div>

                <div class="card-body py-0" style="height: 380px;" id="chat-container" data-simplebar>

                    <div th:each="msg : ${messages}"
                         class="d-flex align-items-start gap-2 my-3 chat-item"
                         th:classappend="${msg.sender == 'USER'} ? 'justify-content-end' : ''">

                        <div th:if="${msg.sender == 'AI'}" class="d-flex align-items-start gap-2">
                            <img src="/images/ai.png" class="avatar-md rounded-circle" alt="AI">
                            <div>
                                <div class="chat-message py-2 px-3 bg-warning-subtle rounded" th:text="${msg.message}"></div>
                                <div class="text-muted fs-xs mt-1">
                                    <i class="ti ti-clock"></i> [[${msg.time}]]
                                </div>
                            </div>
                        </div>

                        <div th:if="${msg.sender == 'USER'}">
                            <div class="chat-message py-2 px-3 bg-primary-subtle rounded text-end" th:text="${msg.message}"></div>
                            <div class="text-muted fs-xs mt-1 text-end">
                                <i class="ti ti-clock"></i> [[${msg.time}]]
                            </div>
                        </div>

                    </div>

                </div>


                <div class="card-footer bg-body-secondary border-top border-dashed border-bottom-0">
                    <form th:action="@{/enseignant/documents/preview/revise}" method="post">
                        <div class="d-flex gap-2">
                            <div class="app-search flex-grow-1">
                                <input type="text"
                                       name="instruction"
                                       class="form-control bg-light-subtle border-light"
                                       placeholder="Ex: Je veux 15 questions"
                                       required>
                                <i data-lucide="message-square" class="app-search-icon text-muted"></i>
                            </div>
                            <button type="submit" class="btn btn-primary btn-icon">
                                <i class="ti ti-send-2 fs-xl"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loadingAiModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center py-5">
                    <div class="spinner-grow avatar-lg text-secondary m-2" role="status"></div>
                    <h5 class="mt-3 mb-2">Mise à jour en cours...</h5>
                    <p class="text-muted mb-0">L’IA modifie le document selon votre consigne.</p>
                </div>
            </div>
        </div>
    </div>

</th:block>

<th:block layout:fragment="javascripts">
    <script th:inline="javascript">
        window.pdfUrl = /*[[${pdfUrl}]]*/ '';
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const reviseForm = document.querySelector('form[action="/enseignant/documents/preview/revise"]');
            const loadingModalEl = document.getElementById("loadingAiModal");

            if (reviseForm) {
                reviseForm.addEventListener("submit", function () {
                    if (loadingModalEl) {
                        const loadingModal = new bootstrap.Modal(loadingModalEl);
                        loadingModal.show();
                    }
                });
            }
        });
    </script>

    <script src="/plugins/pdfjs/pdf.min.js"></script>
    <script src="/js/pages/misc-pdf-viewer.js"></script>
</th:block>

</body>
</html>
