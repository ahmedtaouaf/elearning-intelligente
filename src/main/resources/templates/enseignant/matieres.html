<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<head>
    <th:block layout:fragment="title-meta">
        <th:block th:replace="~{partials/title-meta :: title-meta('User Roles')}" />
    </th:block>

</head>


<body>
<th:block layout:fragment="content">

    <div class="row">
        <div class="col-12">

            <div class="d-flex align-items-sm-center flex-sm-row flex-column my-3">
                <div class="flex-grow-1">
                    <h4 class="fs-xl mb-1">Mes Matières</h4>
                    <p class="text-muted mb-0">Manage roles for smoother operations and secure access.</p>
                </div>

            </div>

            <div class="row">

                <div class="col-sm-6 col-lg-3" th:each="m : ${matieres}">
                    <div class="card h-100 shadow-sm">

                        <img src="/images/books.jpg" class="card-img-top">

                        <div class="card-body d-flex flex-column">

                            <h5 class="card-title">
                                [[${m.nom}]]
                            </h5>

                            <p class="text-muted small">
                                [[${m.description}]]
                            </p>

                            <div class="mt-auto">

                    <span class="badge bg-success-subtle text-success">
                        [[${m.enseignant.nom}]] [[${m.enseignant.prenom}]]
                    </span>

                                <a th:href="@{'/enseignant/matieres/' + ${m.id} + '/modules'}"
                                   class="btn btn-primary w-100 mt-2">
                                    Voir modules
                                </a>

                            </div>

                        </div>

                    </div>
                </div>

            </div>

        </div> <!-- end col-->
    </div> <!-- end row-->


</th:block>

<th:block layout:fragment="javascripts">

    <script src="/js/pages/custom-table.js"></script>


</th:block>

</body>

</html>
